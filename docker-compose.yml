services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: compass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: compass
      POSTGRES_DB: compass_dev
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass -d compass_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
